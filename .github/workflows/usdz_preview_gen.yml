name: Generate USDZ Preview

on:
  workflow_dispatch:

jobs:
  render:
    runs-on: ubuntu-latest

    container:
      image: ghcr.io/pixaranimationstudios/openusd:latest

    steps:
      - uses: actions/checkout@v4

      - name: Generate Preview
        run: |
          usdrecord model.usdz preview.png

      - uses: actions/upload-artifact@v4
        with:
          name: preview
          path: preview.png
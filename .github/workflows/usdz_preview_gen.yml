name: Generate USDZ Preview

on:
  workflow_dispatch:

jobs:
  render:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install OpenUSD
        run: |
          pip install usd-core

      - name: Generate Preview
        run: |
          python -m pxr.UsdAppUtils.usdrecord model.usdz preview.png

      - uses: actions/upload-artifact@v4
        with:
          name: preview
          path: preview.png
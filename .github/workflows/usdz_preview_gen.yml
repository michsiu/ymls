name: Render USDZ Preview

on:
  workflow_dispatch:

jobs:
  render:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Blender
        run: |
          wget https://download.blender.org/release/Blender4.1/blender-4.1.1-linux-x64.tar.xz

          tar -xf blender-4.1.1-linux-x64.tar.xz

      - name: Create Render Script
        run: |
          cat > render.py << 'EOF'
          import bpy
          import math

          bpy.ops.object.select_all(action='SELECT')
          bpy.ops.object.delete()

          bpy.ops.wm.usd_import(filepath="model.usdz")

          cam_data = bpy.data.cameras.new("Camera")
          cam = bpy.data.objects.new("Camera", cam_data)

          bpy.context.collection.objects.link(cam)

          cam.location = (3, -3, 2)
          cam.rotation_euler = (
              math.radians(65),
              0,
              math.radians(45)
          )

          bpy.context.scene.camera = cam

          light_data = bpy.data.lights.new(name="Sun", type='SUN')
          light = bpy.data.objects.new(name="Sun", object_data=light_data)

          bpy.context.collection.objects.link(light)

          light.location = (5, 5, 10)

          scene = bpy.context.scene

          scene.render.engine = 'BLENDER_EEVEE'

          scene.render.resolution_x = 1024
          scene.render.resolution_y = 1024

          scene.render.image_settings.file_format = 'PNG'

          scene.render.filepath = "preview.png"

          bpy.ops.render.render(write_still=True)
          EOF

      - name: Render
        run: |
          ./blender-4.1.1-linux-x64/blender -b -P render.py

      - uses: actions/upload-artifact@v4
        with:
          name: preview
          path: preview.png
name: usd-preview

on:
  workflow_dispatch:

jobs:
  render:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Blender
        run: |
          sudo apt update
          sudo apt install -y blender xvfb

      - name: Run render (headless safe)
        run: |
          xvfb-run -a blender -b -noaudio \
            --factory-startup \
            --python render.py \
            -- models/model.usdz output.png

      - name: Upload result
        uses: actions/upload-artifact@v4
        with:
          name: preview
          path: output.png
name: Render USDZ Preview (Stable 24.04)

on:
  workflow_dispatch:

jobs:
  render:
    runs-on: ubuntu-24.04

    steps:
      # =========================
      # 1. 拉代码
      # =========================
      - name: Checkout repo
        uses: actions/checkout@v4

      # =========================
      # 2. 安装系统依赖（Ubuntu 24.04 修复版）
      # =========================
      - name: Install dependencies (fix EGL + GL)
        run: |
          sudo apt update
          sudo apt install -y \
            wget \
            xvfb \
            libegl1 \
            libgl1 \
            libglx-mesa0 \
            libgbm1 \
            libgl1-mesa-dri \
            mesa-utils

      # =========================
      # 3. 下载 Blender
      # =========================
      - name: Download Blender
        run: |
          wget https://download.blender.org/release/Blender4.0/blender-4.0.2-linux-x64.tar.xz
          tar -xf blender-4.0.2-linux-x64.tar.xz
          mv blender-4.0.2-linux-x64 blender

      # =========================
      # 4. 检查 USDZ 是否存在
      # =========================
      - name: Check input file
        run: |
          ls -al
          test -f model.usdz || (echo "❌ model.usdz not found" && exit 1)

      # =========================
      # 5. 强制 software OpenGL（避免 EGL 崩）
      # =========================
      - name: Set GL fallback
        run: |
          echo "LIBGL_ALWAYS_SOFTWARE=1" >> $GITHUB_ENV

      # =========================
      # 6. 渲染
      # =========================
      - name: Render USDZ
        run: |
          xvfb-run -a ./blender/blender \
            -b \
            --factory-startup \
            --python render.py \
            -- model.usdz output.png

      # =========================
      # 7. 验证输出
      # =========================
      - name: Verify output
        run: |
          ls -al
          test -f output.png || (echo "❌ output.png missing" && exit 1)

      # =========================
      # 8. 上传结果
      # =========================
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: preview
          path: output.png
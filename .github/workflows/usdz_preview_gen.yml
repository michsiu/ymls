name: usd-preview

on:
  workflow_dispatch:

jobs:
  render:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt update && sudo apt install -y xvfb wget tar xz-utils

      - name: Download Blender official build
        run: |
          wget https://download.blender.org/release/Blender4.0/blender-4.0.2-linux-x64.tar.xz
          tar -xf blender-4.0.2-linux-x64.tar.xz

      - name: Render USDZ
        run: |
          xvfb-run -a ./blender-4.0.2-linux-x64/blender -b -noaudio \
            --factory-startup \
            --python render.py \
            -- models/model.usdz output.png

      - name: Upload result
        uses: actions/upload-artifact@v4
        with:
          name: preview
          path: output.png
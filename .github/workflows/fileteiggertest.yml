name: File Upload Trigger

on:
  push:
    paths:
      - '**/*'  # 任何文件的推送都会触发
  # 也可以监听pull request
  pull_request:
    paths:
      - '**/*'

jobs:
  inspect-uploaded-files:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2  # 获取上次提交以便比较
      
      - name: Get trigger information
        run: |
          echo "==================== 触发信息 ===================="
          echo "触发事件: ${{ github.event_name }}"
          echo "触发者: ${{ github.actor }}"
          echo "提交信息: ${{ github.event.head_commit.message }}"
          echo "分支: ${{ github.ref_name }}"
          echo "提交SHA: ${{ github.sha }}"
          echo "================================================"
      
      - name: Get changed files (push event)
        if: github.event_name == 'push'
        run: |
          echo "==================== 新增/修改的文件 ===================="
          
          # 获取本次提交与上次提交的差异
          git diff --name-only HEAD~1 HEAD | while read file; do
            echo "----------------------------------------"
            echo "文件路径: $file"
            echo "文件名: $(basename "$file")"
            echo "所在目录: $(dirname "$file")"
            
            if [ -f "$file" ]; then
              echo "文件大小: $(stat -c%s "$file") bytes"
              echo "文件类型: $(file -b "$file")"
              echo "MD5: $(md5sum "$file" | cut -d' ' -f1)"
              echo "权限: $(stat -c%a "$file")"
              
              # 如果是文本文件，显示前几行
              if file "$file" | grep -q text; then
                echo "预览内容:"
                head -n 3 "$file" | sed 's/^/  /'
              fi
            fi
            echo "----------------------------------------"
          done
      
      - name: Get changed files (pull_request event)
        if: github.event_name == 'pull_request'
        run: |
          echo "==================== PR中新增/修改的文件 ===================="
          
          # 获取PR中变更的文件列表
          git diff --name-only origin/${{ github.base_ref }} HEAD | while read file; do
            echo "----------------------------------------"
            echo "文件路径: $file"
            echo "文件名: $(basename "$file")"
            echo "所在目录: $(dirname "$file")"
            
            if [ -f "$file" ]; then
              echo "文件大小: $(stat -c%s "$file") bytes"
              echo "文件类型: $(file -b "$file")"
              echo "MD5: $(md5sum "$file" | cut -d' ' -f1)"
              echo "修改时间: $(stat -c%y "$file")"
            fi
            echo "----------------------------------------"
          done
      
      - name: List all files (完整文件树)
        run: |
          echo "==================== 当前仓库所有文件 ===================="
          echo "文件总数: $(find . -type f -not -path './.git/*' | wc -l)"
          echo ""
          echo "文件列表:"
          find . -type f -not -path './.git/*' -o -type l | sort | head -n 20
          echo ""
          echo "使用 'ls -la' 查看完整列表"
      
      - name: 详细的提交信息
        run: |
          echo "==================== 提交详情 ===================="
          echo "完整提交信息:"
          git log -1 --stat
          echo ""
          echo "新增文件数: $(git diff --name-only --diff-filter=A HEAD~1 HEAD | wc -l)"
          echo "修改文件数: $(git diff --name-only --diff-filter=M HEAD~1 HEAD | wc -l)"
          echo "删除文件数: $(git diff --name-only --diff-filter=D HEAD~1 HEAD | wc -l)"
      
      - name: 上传文件信息作为Artifact（可选）
        uses: actions/upload-artifact@v4
        with:
          name: uploaded-files-info
          path: |
            .git/logs/HEAD
          retention-days: 7

      - name: 输出摘要到GitHub
        run: |
          echo "## 🚀 Actions已激活！" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 触发信息" >> $GITHUB_STEP_SUMMARY
          echo "- **事件类型**: ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **触发者**: ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "- **提交SHA**: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          echo "### 变更文件" >> $GITHUB_STEP_SUMMARY
          git diff --name-only HEAD~1 HEAD | while read file; do
            echo "- \`$file\`" >> $GITHUB_STEP_SUMMARY
          done
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ Actions执行完成！" >> $GITHUB_STEP_SUMMARY
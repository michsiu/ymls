name: USDZ Auto Render Stable

on:
  workflow_dispatch:

jobs:
  render:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install deps
        run: |
          sudo apt update
          sudo apt install -y xvfb wget tar xz-utils

      - name: Download Blender
        run: |
          wget https://download.blender.org/release/Blender4.0/blender-4.0.2-linux-x64.tar.xz
          tar -xf blender-4.0.2-linux-x64.tar.xz

      # =========================
      # 核心：完全动态命名
      # =========================
      - name: Run Render
        run: |
          set -e

          # ===== 自动找 USDZ =====
          MODEL=$(ls *.usdz | head -n 1)

          if [ -z "$MODEL" ]; then
            echo "❌ 没有找到 USDZ 文件"
            exit 1
          fi

          BASENAME=$(basename "$MODEL" .usdz)
          OUTPUT="${BASENAME}.png"

          echo "INPUT: $MODEL"
          echo "OUTPUT: $OUTPUT"

          cat << EOF > render.py
import bpy
import os
from mathutils import Vector

input_file = "$MODEL"
output_file = os.path.abspath("$OUTPUT")

bpy.ops.wm.read_factory_settings(use_empty=True)

bpy.ops.wm.usd_import(filepath=input_file)

meshes = [o for o in bpy.data.objects if o.type == 'MESH']
if not meshes:
    raise RuntimeError("no mesh found")

# =========================
# bounding box + center
# =========================
min_v = Vector((1e10,1e10,1e10))
max_v = Vector((-1e10,-1e10,-1e10))

for obj in meshes:
    for v in obj.bound_box:
        w = obj.matrix_world @ Vector(v)
        min_v = Vector((
            min(min_v.x,w.x),
            min(min_v.y,w.y),
            min(min_v.z,w.z)
        ))
        max_v = Vector((
            max(max_v.x,w.x),
            max(max_v.y,w.y),
            max(max_v.z,w.z)
        ))

center = (min_v + max_v) / 2
size = (max_v - min_v).length

for obj in meshes:
    obj.location -= center

# =========================
# camera（固定45° + 自适应距离）
# =========================
cam_dist = size * 2.2

bpy.ops.object.camera_add(location=(cam_dist, -cam_dist, cam_dist * 0.6))
cam = bpy.context.object
bpy.context.scene.camera = cam

direction = Vector((0,0,0)) - cam.location
cam.rotation_euler = direction.to_track_quat('-Z','Y').to_euler()

cam.data.lens = 50

# =========================
# light
# =========================
bpy.ops.object.light_add(type='SUN', location=(5,-5,5))
light = bpy.context.object
light.data.energy = 4

# =========================
# white background
# =========================
world = bpy.context.scene.world or bpy.data.worlds.new("World")
bpy.context.scene.world = world
world.use_nodes = True

bg = world.node_tree.nodes["Background"]
bg.inputs[0].default_value = (1,1,1,1)
bg.inputs[1].default_value = 1.2

# =========================
# render (强制正方形)
# =========================
scene = bpy.context.scene
scene.render.engine = 'CYCLES'
scene.cycles.device = 'CPU'
scene.cycles.samples = 32

scene.render.resolution_x = 1024
scene.render.resolution_y = 1024
scene.render.resolution_percentage = 100

scene.render.image_settings.file_format = 'PNG'
scene.render.filepath = output_file

bpy.ops.render.render(write_still=True)

img = bpy.data.images.get("Render Result")
if img:
    img.save_render(filepath=output_file)

print("DONE:", output_file)
EOF

          xvfb-run -a ./blender-4.0.2-linux-x64/blender -b --python render.py

      - name: Verify output
        run: |
          ls -al
          MODEL=$(ls *.usdz | head -n 1)
          BASENAME=$(basename "$MODEL" .usdz)

          test -f "${BASENAME}.png" || (echo "❌ missing output" && exit 1)

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: preview
          path: "*.png"
name: Convert 3D Models to USDZ

on:
  push:
    paths:
      - '**.zip'
      - '**.glb'

jobs:
  convert:
    runs-on: macos-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install gltf-pipeline
        run: npm install -g gltf-pipeline

      - name: Install usdzconvert
        run: |
          # 下载 Apple USDPython 工具包
          # 注意：这个链接可能会过期，需要定期检查更新
          USD_PYTHON_URL="https://dpvfy467eg5j2.cloudfront.net/usdpython/USDPython_0.72.zip"
          
          echo "Downloading USDPython..."
          curl -L -o /tmp/USDPython.zip "$USD_PYTHON_URL"
          
          echo "Extracting USDPython..."
          unzip -q /tmp/USDPython.zip -d /tmp/USDPython
          
          # 查找 usdzconvert 可执行文件
          USDZCONVERT=$(find /tmp/USDPython -name "usdzconvert" -type f | head -n 1)
          
          if [ -z "$USDZCONVERT" ]; then
            echo "ERROR: usdzconvert binary not found in extracted files"
            exit 1
          fi
          
          echo "Found usdzconvert: $USDZCONVERT"
          
          # 添加到 PATH
          USDZ_BIN_DIR=$(dirname "$USDZCONVERT")
          echo "$USDZ_BIN_DIR" >> $GITHUB_PATH
          
          # 设置 PYTHONPATH（usdzconvert 需要的 Python 模块）
          USD_LIB=$(find /tmp/USDPython -type d -name "lib" -path "*/USD/lib/python" | head -n 1)
          if [ -n "$USD_LIB" ]; then
            echo "PYTHONPATH=$USD_LIB" >> $GITHUB_ENV
          fi
          
          # 安装 Python 依赖（如果需要）
          pip3 install --user numpy 2>/dev/null || true
          
          echo "usdzconvert installed successfully"

      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@v44
        with:
          files: |
            **.zip
            **.glb

      - name: Convert to USDZ
        run: |
          # 将文件列表保存到临时文件，避免空格导致循环分割
          echo "${{ steps.changed-files.outputs.all_changed_files }}" > /tmp/changed_files.txt
          
          # ============================================
          # 处理 ZIP 文件（包含 glTF 多文件）
          # ============================================
          while IFS= read -r ZIP_FILE; do
            [ -z "$ZIP_FILE" ] && continue
            
            if [[ "$ZIP_FILE" != *.zip ]]; then
              continue
            fi
            
            echo "Processing ZIP: $ZIP_FILE"
            
            BASENAME=$(basename "$ZIP_FILE" .zip)
            WORK_DIR="tmp_${BASENAME}"
            
            mkdir -p "$WORK_DIR"
            unzip -o "$ZIP_FILE" -d "$WORK_DIR"
            
            GLTF_FILE=$(find "$WORK_DIR" -name "*.gltf" | head -n 1)
            
            if [ -z "$GLTF_FILE" ]; then
              echo "No .gltf found in $ZIP_FILE, skipping..."
              rm -rf "$WORK_DIR"
              continue
            fi
            
            echo "Found glTF: $GLTF_FILE"
            
            GLB_FILE="${BASENAME}.glb"
            USDZ_FILE="${BASENAME}.usdz"
            
            # glTF → GLB
            echo "  Step 1/2: glTF → GLB..."
            gltf-pipeline -i "$GLTF_FILE" -o "$GLB_FILE" || {
              echo "  Failed to pack GLB"
              rm -rf "$WORK_DIR"
              continue
            }
            
            # GLB → USDZ
            echo "  Step 2/2: GLB → USDZ..."
            usdzconvert "$GLB_FILE" "$USDZ_FILE" || {
              echo "  Failed to convert to USDZ"
              rm -rf "$WORK_DIR" "$GLB_FILE"
              continue
            }
            
            echo "  Success: $USDZ_FILE"
            rm -rf "$WORK_DIR" "$ZIP_FILE" "$GLB_FILE"
          done < /tmp/changed_files.txt
          
          # ============================================
          # 处理单个 .glb 文件
          # ============================================
          while IFS= read -r GLB_FILE; do
            [ -z "$GLB_FILE" ] && continue
            
            if [[ "$GLB_FILE" != *.glb ]]; then
              continue
            fi
            
            echo "Processing GLB: $GLB_FILE"
            
            BASENAME=$(basename "$GLB_FILE" .glb)
            USDZ_FILE="${BASENAME}.usdz"
            
            echo "  GLB → USDZ..."
            usdzconvert "$GLB_FILE" "$USDZ_FILE" || {
              echo "  Failed to convert $GLB_FILE"
              continue
            }
            
            echo "  Success: $USDZ_FILE"
            rm -f "$GLB_FILE"
          done < /tmp/changed_files.txt

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: usdz-files
          path: '*.usdz'
          retention-days: 7
name:  3D Models to USDZ

on:
  push:
    paths:
      - '**.zip'
      - '**.glb'

jobs:
  convert:
    runs-on: macos-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install gltf-pipeline
        run: npm install -g gltf-pipeline

      - name: Setup usdzconvert
        uses: virakri/usdzconvert-action@v1

      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@v44
        with:
          files: |
            **.zip
            **.glb

      - name: Convert to USDZ
        run: |
          echo "${{ steps.changed-files.outputs.all_changed_files }}" > /tmp/changed_files.txt
          
          while IFS= read -r ZIP_FILE; do
            [ -z "$ZIP_FILE" ] && continue
            [[ "$ZIP_FILE" != *.zip ]] && continue
            
            echo "Processing ZIP: $ZIP_FILE"
            BASENAME=$(basename "$ZIP_FILE" .zip)
            WORK_DIR="tmp_${BASENAME}"
            
            mkdir -p "$WORK_DIR"
            unzip -o "$ZIP_FILE" -d "$WORK_DIR"
            
            GLTF_FILE=$(find "$WORK_DIR" -name "*.gltf" | head -n 1)
            if [ -z "$GLTF_FILE" ]; then
              echo "No .gltf found, skipping..."
              rm -rf "$WORK_DIR"
              continue
            fi
            
            echo "Found glTF: $GLTF_FILE"
            GLB_FILE="${BASENAME}.glb"
            USDZ_FILE="${BASENAME}.usdz"
            
            echo "  Step 1/2: glTF → GLB..."
            gltf-pipeline -i "$GLTF_FILE" -o "$GLB_FILE" || { rm -rf "$WORK_DIR"; continue; }
            
            echo "  Step 2/2: GLB → USDZ..."
            usdzconvert "$GLB_FILE" "$USDZ_FILE" || { rm -rf "$WORK_DIR" "$GLB_FILE"; continue; }
            
            echo "  Success: $USDZ_FILE"
            rm -rf "$WORK_DIR" "$ZIP_FILE" "$GLB_FILE"
          done < /tmp/changed_files.txt
          
          while IFS= read -r GLB_FILE; do
            [ -z "$GLB_FILE" ] && continue
            [[ "$GLB_FILE" != *.glb ]] && continue
            
            echo "Processing GLB: $GLB_FILE"
            BASENAME=$(basename "$GLB_FILE" .glb)
            USDZ_FILE="${BASENAME}.usdz"
            
            echo "  GLB → USDZ..."
            usdzconvert "$GLB_FILE" "$USDZ_FILE" || continue
            
            echo "  Success: $USDZ_FILE"
            rm -f "$GLB_FILE"
          done < /tmp/changed_files.txt

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: usdz-files
          path: '*.usdz'
          retention-days: 7